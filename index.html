<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT SUPPORT CENTER</title>
    <style>
        :root { --neon-green: #00ff41; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { width: 100%; max-width: 450px; border: 1px solid #1a1a1a; padding: 50px 40px; border-radius: 30px; background: #0a0a0a; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { color: var(--neon-green); font-size: 26px; margin-bottom: 8px; letter-spacing: 1px; }
        .subtitle { color: #555; font-size: 13px; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 4px; }
        .service-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #121212; font-size: 15px; }
        .service-name { color: #eee; }
        .price { color: var(--neon-green); font-weight: 600; }
        .btn { display: block; margin-top: 50px; padding: 18px; background: var(--neon-green); color: #000; text-align: center; text-decoration: none; border-radius: 15px; font-weight: bold; transition: all 0.4s ease; letter-spacing: 1px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,255,65,0.2); }
    </style>
</head>
<body>

<div class="card">
    <h1>IT SUPPORT CENTER</h1>
    <div class="subtitle">PREMIUM TECH SOLUTIONS</div>

    <div class="service-row">
        <span class="service-name">系统重装</span>
        <span class="price">RM 50</span>
    </div>
    <div class="service-row">
        <span class="service-name">软件安装 (单项)</span>
        <span class="price">RM 0.5</span>
    </div>
    <div class="service-row">
        <span class="service-name">数据拷贝 (1GB)</span>
        <span class="price">RM 1</span>
    </div>
    <div class="service-row">
        <span class="service-name">文件/深度修复</span>
        <span class="price">RM 30 - 100</span>
    </div>

    <a href="https://t.me/itsupport08" class="btn">联系技术专家</a>
</div>

</body>
</html>
